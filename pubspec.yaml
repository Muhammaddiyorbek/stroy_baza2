name: stroy_baza
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  #  Bloc
  bloc: ^9.0.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  formz: ^0.8.0

  go_router: ^14.8.0
  flutter_svg: ^2.0.17
  device_preview: ^1.2.0
  intl: ^0.19.0
  carousel_slider: ^4.2.1
  yandex_mapkit: ^4.1.0
  lucide_icons: ^0.257.0
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.8.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter_intl:
  enabled: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/profile_icons/

